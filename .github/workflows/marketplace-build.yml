name: Marketplace Build

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Exact commit SHA to build"
        required: true
      image_tag:
        description: "Image tag to use (computed by GM, e.g. 'abc1234abcd')"
        required: true
      app_name:
        description: "App name from app-manifest.yaml (used for image naming)"
        required: true
      enable_sdr:
        description: "If true, also push to DockerHub for Self-Deployed Runtime"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Minimum run time
        run: sleep 60


      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image names
        id: img
        run: |
          echo "ghcr_image=ghcr.io/anurag-atlan/${{ inputs.app_name }}-main" >> $GITHUB_OUTPUT
          echo "dockerhub_image=anurag-atlan/${{ inputs.app_name }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.ghcr_image }}:${{ inputs.image_tag }}
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.GITHUB_TOKEN }}

      # --- Conditional DockerHub push (SDR apps only) ---
      - name: Login to DockerHub
        if: ${{ inputs.enable_sdr == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to DockerHub (SDR)
        if: ${{ inputs.enable_sdr == 'true' }}
        run: |
          docker buildx imagetools create \
            ${{ steps.img.outputs.ghcr_image }}:${{ inputs.image_tag }} \
            --tag ${{ steps.img.outputs.dockerhub_image }}:main-${{ inputs.image_tag }}
